name: verify-and-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Basic schema/spec checks
        run: |
          set -euo pipefail
          jq -e '.spec == "openpharm.sync.revocation.v1"' revocation.json >/dev/null
          jq -e '.signature != "UNSIGNED"' revocation.json >/dev/null
          for m in artifacts/*/manifest.json; do
            jq -e '.spec == "openpharm.sync.manifest.v1"' "$m" >/dev/null
            jq -e '.signature != "UNSIGNED"' "$m" >/dev/null
            jq -e '.keyId != "UNSIGNED"' "$m" >/dev/null
            jq -e '.snapshots | length >= 1' "$m" >/dev/null
          done

      - name: Ensure manifest keyId exists in revocation trust list
        run: |
          set -euo pipefail
          for m in artifacts/*/manifest.json; do
            kid=$(jq -r '.keyId' "$m")
            jq -e --arg kid "$kid" '.trustedOperatorKeys[] | select(.keyId == $kid)' revocation.json >/dev/null
          done

      - name: Build static site
        run: |
          set -euo pipefail
          mkdir -p _site/sync
          cp -r artifacts/* _site/sync/
          cp revocation.json _site/sync/revocation.json
          {
            echo '<!doctype html><meta charset=utf-8><title>openpharm policy data</title>'
            echo '<h1>openpharm-update policy data CDN</h1>'
            echo '<ul>'
            for ch in artifacts/*/; do
              slug=$(basename "$ch")
              echo "<li><a href=\"sync/$slug/manifest.json\">$slug</a></li>"
            done
            echo '</ul>'
            echo '<p><a href="sync/revocation.json">revocation.json</a></p>'
          } > _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4

      - name: Sync _site/sync to Cloudflare R2 mirror
        if: ${{ vars.R2_ENABLED == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT_URL: ${{ vars.R2_ENDPOINT_URL }}
          R2_BUCKET: openpharm-update-mirror
        run: |
          set -euo pipefail
          if [ -z "${R2_ENDPOINT_URL:-}" ]; then
            echo "R2_ENDPOINT_URL var is required when R2_ENABLED=true"
            exit 1
          fi
          aws s3 sync _site/sync "s3://${R2_BUCKET}/sync" \
            --endpoint-url "$R2_ENDPOINT_URL" \
            --delete

      - name: Skip R2 sync (R2 disabled)
        if: ${{ vars.R2_ENABLED != 'true' }}
        run: echo "R2 sync skipped because vars.R2_ENABLED is not true."
